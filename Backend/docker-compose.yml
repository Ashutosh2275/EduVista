version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduvista-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/eduvista
      - JWT_ACCESS_SECRET=prod_access_secret_key_change_me_987654321_long
      - JWT_REFRESH_SECRET=prod_refresh_secret_key_change_me_987654321_long
      - JWT_ACCESS_EXPIRE=15m
      - JWT_REFRESH_EXPIRE_DAYS=7
      - SMTP_HOST=smtp.mailgun.org
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=postmaster@yourdomain.com
      - SMTP_PASS=your_smtp_password
      - SMTP_FROM_NAME=EduVista Support
      - SMTP_FROM_EMAIL=support@eduvista.com
      - FRONTEND_URL=http://localhost:3000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      - db
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
    restart: always

  db:
    image: mongo:6.0
    container_name: eduvista-db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
